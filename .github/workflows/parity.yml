name: Parity Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run parity tests
        run: |
          cd apps/api
          for test_file in test_parity*.py; do
            if [ -f "$test_file" ]; then
              python "$test_file" || exit 1
            fi
          done
