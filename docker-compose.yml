version: '3.8'

services:
  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/models:/app/models
    environment:
      - MODEL_ASSETS_DIR=/app/models/bonn
      - LOG_LEVEL=info
      - CORS_ORIGINS=["http://localhost:5173"]
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
