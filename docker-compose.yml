version: '3.8'

services:
  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/models:/app/models
    environment:
      - MODEL_ASSETS_DIR=/app/models/bonn
      - LOG_LEVEL=info
      - CORS_ORIGINS=["http://localhost:5173"]
      - DATABASE_URL=postgresql://neuroaegis:password@db:5432/neuroaegis_db
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: neuroaegis
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neuroaegis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
